<VirtualHost *:80>
    ServerName your-domain.com
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    # Deny access to everything else by default
    <Directory /var/www/html>
        AllowOverride None
        Require all denied
    </Directory>

    ErrorLog \\${APACHE_LOG_DIR}/meghbelaweb_error.log
    CustomLog \\${APACHE_LOG_DIR}/meghbelaweb_access.log combined
</VirtualHost> 